      const s=this.state;
      const flying = (s.iface==='client'&&s.screen==='tracking') || (s.iface==='supplier'&&s.supScreen==='flight');
      this.setState({now:Date.now()});
      if(flying && !s.serialOn) this.setState(st=>({flyProgress: Math.min(1, st.flyProgress + 0.012)}));
    }, 650);
    this._bt = setInterval(()=>this.setState(s=>({bannerIdx:((s.bannerIdx||0)+1)%3})), 10000);
  }
  componentWillUnmount(){ clearInterval(this._t); clearInterval(this._bt); this.disconnectSerial(); }

  go(screen, extra){

    this.setState(Object.assign({screen}, extra||{}));
    // En revenant du détail produit vers le catalogue, restaure la position précédente
    if(screen==='home' && from==='product' && this._homeScroll){
      const y=this._homeScroll;
      requestAnimationFrame(()=>requestAnimationFrame(()=>window.scrollTo&&window.scrollTo(0,y)));
    } else {
      window.scrollTo&&window.scrollTo(0,0);
    }
  }

  setIface(iface){ this.setState({iface, screen: iface==='client'?'home':'dashboard', supScreen:'dashboard'}); }

  visibleProducts(){
    const p=this.products();
    let list = this.state.cat==='all'?p:p.filter(x=>x.cat===this.state.cat);
    const q=(this.state.query||'').trim().toLowerCase();
    if(q) list=list.filter(x=>x.name.toLowerCase().includes(q)||x.catName.toLowerCase().includes(q));
    return list;
  }

  // cart keyed by id + option
  keyOf(id,opt){ return opt?id+'::'+opt:id; }
  qtyInCart(id,opt){ const it=this.state.cart.find(i=>i.key===this.keyOf(id,opt)); return it?it.qty:0; }
  addToCart(p,opt){
    this.setState(s=>{
      const key=this.keyOf(p.id,opt);
      const c=s.cart.slice(); const f=c.find(i=>i.key===key);
      if(f) f.qty++; else c.push(Object.assign({},p,{key,opt:opt||null,qty:1}));
      return {cart:c};
    });
  }
  setQtyKey(key,d){
    this.setState(s=>({cart: s.cart.map(i=>i.key===key?Object.assign({},i,{qty:i.qty+d}):i).filter(i=>i.qty>0)}));
  }
  cartCount(){ return this.state.cart.reduce((n,i)=>n+i.qty,0); }
  fastEta(){ const e=this.state.cart.map(i=>i.eta); return e.length?Math.max.apply(null,e):0; }

  // caméra embarquée + barre latérale
  toggleSupNav(){ this.setState(s=>({supNavCollapsed:!s.supNavCollapsed})); }
  openCam(){ this.setState({camOpen:true}); }
  closeCam(){ this.setState({camOpen:false}); }
  capturePhoto(){
    this.setState(s=>({photoFlash:true, photoCount:s.photoCount+1}));
    setTimeout(()=>{ try{ this.setState({photoFlash:false}); }catch(e){} }, 420);
  }
  // configuration de l'URL du flux ESP32-CAM (MJPEG WiFi)
  toggleCamConfig(){ this.setState(s=>({camConfig:!s.camConfig})); }
  setCamUrl(u){ try{ localStorage.setItem('mf_cam_url', u||''); }catch(e){} this.setState({camUrl:u||'', camErr:false, camConfig:false}); }

  // ===== Connexion USB au firmware (Web Serial API) =====
  async connectSerial(){
    if(!('serial' in navigator)){ this.setState({serialErr:"Web Serial non supporté par ce navigateur (utilisez Chrome/Edge sur HTTPS)."}); return; }
    try{
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      this._port = port;
      this.setState({serialOn:true, serialErr:'', live:{}});
      this._readSerial();
    }catch(e){
      this.setState({serialErr: e&&e.message? e.message : 'Connexion annulée.'});
    }
  }
  async _readSerial(){
    const dec = new TextDecoder();
    let buf='';
    try{
      this._reader = this._port.readable.getReader();
      while(true){
        const {value, done} = await this._reader.read();
        if(done) break;
        buf += dec.decode(value, {stream:true});
        let nl;
        while((nl = buf.indexOf('\n')) >= 0){
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl+1);
          if(line) this._parseTelemetry(line);
        }
      }
    }catch(e){ /* lecture interrompue */ }
  }
  _parseTelemetry(line){
    const L = Object.assign({}, this.state.live||{});
    const num = re => { const m=line.match(re); return m? parseFloat(m[1]) : null; };
    let v;
    // Formats firmware tolérés (MediFly ESP32) :
    //   "DESARME | R: 0.2° P: 0.2° | ALT:0.14m T:24.4°C | GPS:FIX SAT:7 LAT:33.573100 LNG:-7.589800"
    //   (ARME / DESARME pour l'état armement ; SAT: ou Sats: ; LAT: ou Lat: ou Latitude:)
    if((v=num(/\bR:\s*(-?\d+(?:\.\d+)?)/))    !=null) L.roll=v;   // MPU6050 roll
    if((v=num(/\bP:\s*(-?\d+(?:\.\d+)?)/))    !=null) L.pitch=v;  // MPU6050 pitch
    if((v=num(/THR:\s*(\d+)/i))               !=null) L.thr=v;    // throttle µs
    if((v=num(/\bALT:\s*(-?\d+(?:\.\d+)?)/i)) !=null) L.alt=v;    // BMP280 altitude (m)
    if((v=num(/\bT:\s*(-?\d+(?:\.\d+)?)/))    !=null) L.temp=v;   // BMP280 temperature (°C)
    if((v=num(/\bSATS?:\s*(\d+)/i))           !=null) L.sats=v;   // SAT:7 ou Sats:7
    if((v=num(/\b(?:LAT|LATITUDE):\s*(-?\d+(?:\.\d+)?)/i))  !=null) L.lat=v;
    if((v=num(/\b(?:LNG|LON|LONG|LONGITUDE):\s*(-?\d+(?:\.\d+)?)/i)) !=null) L.lon=v;
    if((v=num(/\b(?:SPD|SPEED|VIT):\s*(-?\d+(?:\.\d+)?)/i)) !=null) L.speed=v;  // km/h optionnel
    if((v=num(/\b(?:HDG|HEADING|CAP):\s*(-?\d+(?:\.\d+)?)/i))!=null) L.heading=v; // cap optionnel
    if(/GPS:\s*FIX/i.test(line))       L.gpsFix=true;
    else if(/GPS:\s*-{2,}/.test(line)) L.gpsFix=false;
    if(/\bARME(?:D)?\b/i.test(line) && !/DESARME/i.test(line)) L.armed=true;
    else if(/DESARME/i.test(line) || /Armed:\s*NON/i.test(line)) L.armed=false;
    else if(/Armed:\s*OUI/i.test(line)) L.armed=true;
    // événements treuil optionnels : [WINCH] Descente / Remontée / Arrêt
    if(/\[WINCH\]/i.test(line)){
      if(/Descente/i.test(line)) L.boxMotion='descending';
      else if(/Remont/i.test(line)) L.boxMotion='ascending';
      else if(/Arr/i.test(line)) L.boxMotion='idle';
    }
    L._t = Date.now();
    this.setState({live:L});
  }
  async disconnectSerial(){
    try{ if(this._reader){ await this._reader.cancel(); this._reader.releaseLock(); } }catch(e){}
    try{ if(this._port){ await this._port.close(); } }catch(e){}
    this._reader=null; this._port=null;
    if(this.state) this.setState({serialOn:false});
  }

  // order history (mock)
  clientOrders(){ return [
    {id:'MF-2026-0481', date:"Aujourd'hui · 11:24", items:'Naloxone ×2', status:'En vol', c:'#1E7FE5'},
    {id:'MF-2026-0477', date:'Hier · 18:02', items:'Poche de sang O− ×1, Adrénaline ×3', status:'Livrée', c:'#1FA97A'},

  // ===== ALGORITHME DE PRIORISATION (port JS de main.py PLBD 19) =====
  // Coefficients identiques au backend FastAPI MediFly (fichier algorithmes/main.py)
  priorityCoeffs(){ return { W_URGENCE: 15.0, W_TEMPS: -0.5, W_AGING: 0.05, VITESSE_CROISIERE_KMH: 60.0, POIDS_BOITE_KG: 2.0 }; }

  // Estime le temps de vol en minutes (port de estimer_temps_vol_reel)
  estimerTempsVol(distance_km, facteur_meteo){
    const v = (facteur_meteo||1.0) * this.priorityCoeffs().VITESSE_CROISIERE_KMH;
    if(v<=0) return Infinity;
    return (distance_km/v)*60;
  }

  // Score d'urgence médicale par nom de médicament (port de medicaments_dataset.csv,
  // étendu avec les produits du catalogue MediFly). Score de 1 (routine) à 10 (vital).
  medUrgence(name){
    const m={
      // Dataset original PLBD 19
      'insuline':9,'adrénaline':10,'adrenaline':10,'antivenin':10,'paracétamol':2,'paracetamol':2,
      'amoxicilline':6,'salbutamol':8,'morphine':9,'rage':7,'dextrose':7,'atropine':10,
      'diazépam':8,'diazepam':8,'furosémide':5,'furosemide':5,'spasfon':3,'hydrocortisone':7,
      'physiologique':4,'naloxone':10,'vitamine':1,'augmentin':6,'héparine':8,'heparine':8,
      // Extensions catalogue MediFly
      'sang':9,'plasma':7,'tétanique':6,'tetanique':6,'kit':4,'suture':4,
      'oxygène':9,'oxygene':9,'trousse':3,'secours':3
    };
    const k=(name||'').toLowerCase();
    let max=1;
    Object.keys(m).forEach(function(w){ if(k.indexOf(w)>=0 && m[w]>max) max=m[w]; });
    return max;
  }

  // Score de priorité IA d'une commande : urgence × W_URGENCE + temps_vol × W_TEMPS + attente × W_AGING
  priorityScore(urgence, distance_km, age_seconds){
    const W=this.priorityCoeffs();
    const t=this.estimerTempsVol(distance_km||5, 1.0);
    return urgence*W.W_URGENCE + t*W.W_TEMPS + (age_seconds||0)*W.W_AGING;
  }

  // Retourne supOrders enrichi des scores, trié par priorité décroissante
  scoredOrders(){
    const c=this;
    return c.supOrders().map(function(o){
      const u=c.medUrgence(o.item);
      const d=o.distance_km||(5+Math.random()*8);
      const age=o.age_seconds||(o.status==='À confirmer'?300:o.status==='En vol'?600:1800);
      const s=c.priorityScore(u,d,age);
      let cat='Standard', col='#1FA97A';
      if(s>=130){ cat='Critique'; col='#E5484D'; }
      else if(s>=90){ cat='Élevée'; col='#E08600'; }
      else if(s>=60){ cat='Modérée'; col='#1565D8'; }
      return Object.assign({},o,{urgence:u,score:Math.round(s*10)/10,scoreCat:cat,scoreColor:col,distance_km:Math.round(d*10)/10});
    }).sort(function(a,b){ return b.score - a.score; });
  }

  // Télémétrie de vol — deux modes ÉTANCHES :
  //  • Drone connecté (serialOn)  → uniquement les données envoyées par le firmware
  //  • Mode démo (non connecté)  → simulation pédagogique (vol fictif Casa)
  telemetry(){
    const d=new Date(this.state.now||Date.now());
    const pad=n=>(n<10?'0':'')+n;
    const dateStr=pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
    const timeStr=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());

    // ====== Mode DRONE LIVE — aucune simulation ======
    if(this.state.serialOn){
      const L=this.state.live||{};
      const v=(x,fmt)=>(x==null||(typeof x==='number'&&!isFinite(x)))?'--':(fmt?fmt(x):x);
      return {
        progress: null,
        eta:    '--',
        dist:   '--',
        alt:    v(L.alt,   n=>Math.round(n)),
        speed:  v(L.speed, n=>Math.round(n)),
        bat:    v(L.bat),
        temp:   v(L.temp,  n=>n.toFixed(1)),
        lat:    v(L.lat,   n=>n.toFixed(5)),
        lon:    v(L.lon,   n=>n.toFixed(5)),
        sats:   v(L.sats),
        heading: (typeof L.heading==='number')?L.heading:0,
        roll:   v(L.roll,  n=>n.toFixed(1)),
        pitch:  v(L.pitch, n=>n.toFixed(1)),
        gpsFix: !!L.gpsFix,
        armed:  !!L.armed,
        time:   timeStr,
        date:   dateStr,
        boxMotion: L.boxMotion||'idle',
        source: 'Drone (USB · live)',
      };
    }

    // ====== Mode SIMULATION — drone non connecté ======
    const p=this.state.flyProgress;
    const alt = p>=1?0:Math.round(55+Math.sin(p*Math.PI)*75);
    let boxMotion='idle';
    if(p>0.01 && p<0.12) boxMotion='ascending';
    else if(p>=0.88 && p<1) boxMotion='descending';
    return {
      progress:p,
      eta: Math.max(0, Math.round((1-p)*9)),
      dist: ((1-p)*8.4).toFixed(1),
      alt: alt,
      speed: p>=1?0:64,
      bat: Math.round(92-p*24),
      temp: (24.5 - alt*0.035).toFixed(1),
      lat: (33.5731+p*0.02).toFixed(5),
      lon: (-7.5898+p*0.015).toFixed(5),
      sats: p>0.3?11:8,
      heading: Math.round((74+Math.sin(p*6)*12+360)%360),
      roll: (Math.sin((this.state.now||0)/700)*2.4).toFixed(1),
      pitch: (Math.cos((this.state.now||0)/900)*2.0).toFixed(1),
      gpsFix: true,
      armed: p>0 && p<1,
      time: timeStr,
      date: dateStr,
      boxMotion: boxMotion,
      source: 'Simulation',
    };
  }

  renderVals(){ return { app: React.createElement(MFApp, {c:this}) }; }
}

// ============== ICONS ==============
function Icon(name, size, color){
  size=size||22; color=color||'currentColor';
  const s={width:size,height:size,fill:'none',stroke:color,strokeWidth:1.9,strokeLinecap:'round',strokeLinejoin:'round'};

function RealMap(props){

  const A=[33.5731,-7.5898];
  const B=[33.5931,-7.5748];
  function curPos(){
    let lat=parseFloat(t.lat), lon=parseFloat(t.lon);
    if(t.gpsFix && isFinite(lat) && isFinite(lon) && Math.abs(lat)>1 && Math.abs(lon)>1) return [lat,lon];
    // Pas de fix GPS : en simulation on interpole A→B, en mode live on reste au dépôt
    if(t.progress!=null){

    R.todo.setLatLngs([pos,B]);

  React.useEffect(function(){
    let stop=false;
    (function init(){
      if(stop) return;
      const L=window.L;

      L.tileLayer('https://{s}.google.com/vt/lyrs=y&hl=fr&x={x}&y={y}&z={z}',{
        maxZoom:20,
        subdomains:['mt0','mt1','mt2','mt3'],
        attribution:'© Google'

      ref.current.done=L.polyline([A],{color:'#1E7FE5',weight:4,opacity:.95}).addTo(map);

      ref.current.drone=L.marker(A,{zIndexOffset:1000,icon:droneIcon(L,0)}).addTo(map);
      ref.current.map=map;
      map.fitBounds(L.latLngBounds([A,B]).pad(0.45));
      setTimeout(function(){ if(ref.current.map) ref.current.map.invalidateSize(); },140);
